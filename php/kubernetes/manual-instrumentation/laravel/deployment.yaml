apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-laravel-k8s-manual
  labels:
    app: php-laravel-k8s-manual
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-laravel-k8s-manual
  template:
    metadata:
      labels:
        app: php-laravel-k8s-manual
    spec:
      containers:
      - name: php-laravel-k8s-manual
        image: php-laravel-k8s-manual:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        # OpenTelemetry Service Configuration
        - name: OTEL_SERVICE_NAME
          value: "php-laravel-k8s-manual"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"
        - name: OTEL_SERVICE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # OpenTelemetry Exporter Configuration
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4338"
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4338"
        - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4318"
        - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4328"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"

        # Laravel Configuration
        - name: APP_KEY
          value: "base64:fIdKPqi4HeuYlBkDjU9m0zS1CxTAXIcAFt7wvuV7//M="
        - name: SESSION_DRIVER
          value: "array"
        - name: LOG_CHANNEL
          value: "stderr"

        # Application Configuration
        - name: PORT
          value: "8080"

        # Resource Limits
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Health Checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: php-laravel-k8s-manual
  labels:
    app: php-laravel-k8s-manual
spec:
  type: ClusterIP
  selector:
    app: php-laravel-k8s-manual
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
