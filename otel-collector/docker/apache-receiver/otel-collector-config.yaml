receivers:
  apache:
    # Apache mod_status endpoint — the collector pulls metrics on each interval
    endpoint: http://apache:80/server-status?auto
    collection_interval: 60s

processors:
  batch:

exporters:
  otlp:
    endpoint: otlp-grpc-receiver.eu.sematext.com:443
    compression: none
    headers:
      X-API-TOKEN: ${env:METRICS_TOKEN}

service:
  pipelines:
    metrics:
      receivers: [apache]
      processors: [batch]
      exporters: [otlp]
