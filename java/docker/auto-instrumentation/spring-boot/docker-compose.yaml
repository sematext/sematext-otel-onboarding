version: '3.8'

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    environment:
      # Sematext App tokens (replace with your tokens)
      - TRACES_TOKEN=21f96d5c-c6b7-4963-99fe-1454a011429e
      - METRICS_TOKEN=e3b9ddd8-55ee-4d86-8c55-5c04be82127f
      - LOGS_TOKEN=74a3940f-cab4-4b54-841c-a0cce496e6b2
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
    restart: unless-stopped

  java-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=java-spring-docker-auto
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    depends_on:
      - otel-collector
    restart: unless-stopped
