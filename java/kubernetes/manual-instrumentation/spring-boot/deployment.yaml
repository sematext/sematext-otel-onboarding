apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-spring-k8s-manual
  labels:
    app: java-spring-k8s-manual
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-spring-k8s-manual
  template:
    metadata:
      labels:
        app: java-spring-k8s-manual
    spec:
      containers:
      - name: java-spring-k8s-manual
        image: java-spring-k8s-manual:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        # Service Configuration
        - name: OTEL_SERVICE_NAME
          value: "java-spring-k8s-manual"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"

        # OTLP Protocol Configuration
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"

        # OTLP Exporter Endpoints
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4338/v1/traces"
        - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4318/v1/metrics"
        - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
          value: "http://st-agent-sematext-agent.sematext.svc.cluster.local:4328/v1/logs"

        # Kubernetes Metadata
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.namespace=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME)"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 50
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: java-spring-k8s-manual
  labels:
    app: java-spring-k8s-manual
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: java-spring-k8s-manual
